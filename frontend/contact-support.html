<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CorePlx Quality DMS - Contact Support</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/styles.css" rel="stylesheet">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--cp-bg, #F5F7FA); }
    .support-card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid #e0e7ef;
      border-radius: 1.2rem;
      box-shadow: 0 .5rem 1.5rem rgba(13,33,68,.08);
    }
    .ticket-sent { display:none; }
  </style>
</head>
<body>
<div class="support-card p-4 p-md-5">

  <!-- ── Form view ── -->
  <div id="ticketForm">
    <div class="mb-4">
      <div class="text-uppercase small fw-semibold mb-2" style="color:#6B7280;">CorePlx Quality DMS</div>
      <h3 class="mb-1" style="color:#0D2144;font-weight:700;">Contact Support</h3>
      <p class="text-muted mb-0" style="font-size:14px;">Raise a support ticket and our team will get back to you.</p>
    </div>

    <div class="mb-3">
      <label class="form-label">Your Name <span class="text-danger">*</span></label>
      <input type="text" class="form-control" id="sName" placeholder="Enter your full name">
    </div>

    <div class="mb-3">
      <label class="form-label">Email Address <span class="text-danger">*</span></label>
      <input type="email" class="form-control" id="sEmail" placeholder="Enter your email">
    </div>

    <div class="mb-3">
      <label class="form-label">Issue Type <span class="text-danger">*</span></label>
      <select class="form-select" id="sType">
        <option value="">-- Select issue type --</option>
        <option>Login / Access Issue</option>
        <option>Password Reset Problem</option>
        <option>Document Not Loading</option>
        <option>Approval Workflow Issue</option>
        <option>User Management</option>
        <option>Technical / System Error</option>
        <option>Other</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Subject <span class="text-danger">*</span></label>
      <input type="text" class="form-control" id="sSubject" placeholder="Brief description of the issue">
    </div>

    <div class="mb-4">
      <label class="form-label">Message <span class="text-danger">*</span></label>
      <textarea class="form-control" id="sMessage" rows="4" placeholder="Describe your issue in detail — include any error messages or steps you tried"></textarea>
    </div>

    <div class="d-grid gap-2">
      <button class="btn btn-primary" onclick="submitTicket()">Submit Ticket</button>
      <a href="login-admin.html" class="btn btn-outline-secondary">Back to Login</a>
    </div>

    <div class="text-center mt-3" style="font-size:12px;color:#9ca3af;">
      Powered by <a href="https://support.coreplx.com" target="_blank">support.coreplx.com</a>
    </div>
  </div>

  <!-- ── Success view ── -->
  <div id="ticketSent" class="ticket-sent text-center">
    <div style="font-size:3rem;margin-bottom:12px;">✅</div>
    <h3 class="mb-2" style="color:#0D2144;font-weight:700;">Ticket Submitted</h3>
    <p class="text-muted mb-4" style="font-size:14px;">
      Your support request has been received.<br>
      We will get back to you at <strong id="confirmedEmail"></strong> shortly.
    </p>
    <div class="d-grid gap-2">
      <a href="login-admin.html" class="btn btn-primary">Back to Login</a>
    </div>
    <div class="text-center mt-3" style="font-size:12px;color:#9ca3af;">
      Track your ticket at <a href="https://support.coreplx.com" target="_blank">support.coreplx.com</a>
    </div>
  </div>

</div>

<script>
function submitTicket() {
  var name    = document.getElementById('sName').value.trim();
  var email   = document.getElementById('sEmail').value.trim();
  var type    = document.getElementById('sType').value;
  var subject = document.getElementById('sSubject').value.trim();
  var message = document.getElementById('sMessage').value.trim();

  if (!name || !email || !type || !subject || !message) {
    alert('Please fill in all required fields before submitting.');
    return;
  }

  // TODO: POST to support.coreplx.com API when ready
  // fetch('https://support.coreplx.com/api/tickets', {
  //   method: 'POST',
  //   headers: { 'Content-Type': 'application/json' },
  //   body: JSON.stringify({ name, email, type, subject, message })
  // });

  document.getElementById('confirmedEmail').textContent = email;
  document.getElementById('ticketForm').style.display = 'none';
  document.getElementById('ticketSent').style.display = 'block';
}
</script>
</body>
</html>
